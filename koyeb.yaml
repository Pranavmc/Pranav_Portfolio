name: pranav-portfolio-api
services:
  - name: api
    type: web
    env: node
    root_dir: server
    build_command: npm install
    run_command: npm start
    instance_type: free
    ports:
      - port: 5000
        protocol: http
    routes:
      - path: /
    health_checks:
      - path: /health
        port: 5000
        initial_delay: 10s
        interval: 30s
        timeout: 5s
        unhealthy_threshold: 3
        healthy_threshold: 1
    env_vars:
      - key: MONGO_URI
        value: your-mongodb-connection-string
      - key: ALLOWED_ORIGINS
        value: https://your-project-name.vercel.app
      - key: SMTP_HOST
        value: smtp.yourprovider.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        value: your-smtp-username
      - key: SMTP_PASS
        value: your-smtp-password
      - key: EMAIL_FROM
        value: your-sender-email@yourdomain.com
      - key: EMAIL_FROM_NAME
        value: Portfolio
      - key: EMAIL_RECEIVER
        value: yourname@gmail.com
